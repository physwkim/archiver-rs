name: Rust

# Strict lint + test gate on the canonical target (Linux x86_64).
# This proves the workspace is *clean* — rustfmt, clippy `-D warnings`,
# doctests. `cross-platform.yml` proves it *compiles and tests* on
# macOS / Windows / arm64; running the strict clippy gate 6× would only
# add platform-specific lint noise, so it lives here on one target.

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

# A new push to the same ref cancels the in-flight run.
concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test (nextest)
        run: cargo nextest run --workspace

      - name: Doctests
        run: cargo test --doc --workspace
