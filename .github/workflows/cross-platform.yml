name: Cross-platform build

# Build + test the whole workspace on Linux, macOS, and Windows, each on
# both arm64 and x86_64. The strict lint gate (clippy `-D warnings`,
# fmt, doctests) stays in `rust.yml` on Linux x86_64. This workflow
# proves the code *compiles and tests* everywhere; `rust.yml` proves
# it's *clean* on the canonical target.
#
# Hosted-runner notes:
#   * `ubuntu-24.04-arm` / `windows-11-arm` are GitHub-hosted arm64
#     runners — free for public repositories, billed for private ones.
#   * `macos-15-intel` is an Intel (x86_64) macOS image; `macos-latest`
#     (macos-15) is Apple Silicon (arm64).
#
# Native toolchain: the workspace pulls in `rusqlite` with the `bundled`
# feature (compiles SQLite from C) and `ring` via rustls (compiles C/asm
# per arch). Every GitHub-hosted image above ships a working C compiler
# (gcc on Linux, clang on macOS, MSVC — incl. the ARM64 target — on
# Windows), so no extra toolchain setup or vendored library is needed.

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

# A new push to the same ref cancels the in-flight matrix.
concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      # One platform failing must not cancel the others — each cell
      # reports portability independently.
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-arm64
            os: macos-latest
          - name: macos-x86_64
            os: macos-15-intel
          - name: windows-x86_64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - uses: taiki-e/install-action@nextest

      # Per-platform target cache, keyed on the matrix name so the six
      # cells don't clobber each other's cache.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      # Compiles libs, bins, AND test targets — the surest catch for
      # platform-specific source that isn't `#[cfg]`-gated.
      - name: Build (workspace + tests)
        run: cargo build --workspace --tests --verbose

      # `ci` profile (.config/nextest.toml) adds retries for the flaky
      # network/timing integration suites on slower hosted runners.
      - name: Test (nextest)
        run: cargo nextest run --workspace --profile ci
