<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPICS Archiver - Data Viewer</title>
<link rel="stylesheet" href="/mgmt/ui/vendor/uplot.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #1a237e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 500; }
  .header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; }
  .header a:hover { color: white; }
  .container { max-width: none; margin: 0; padding: 24px; }
  .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #555; }
  .form-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  input[type="text"], input[type="datetime-local"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  input[type="text"] { width: 320px; }
  button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .btn-primary { background: #1a237e; color: white; }
  .btn-primary:hover { background: #283593; }
  .btn-secondary { background: #757575; color: white; }
  .btn-secondary:hover { background: #616161; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-outline { background: white; color: #1a237e; border: 1px solid #1a237e; }
  .btn-outline:hover { background: #e8eaf6; }
  .btn-outline.active { background: #1a237e; color: white; }
  .pv-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pv-tag { display: inline-flex; align-items: center; gap: 4px; background: #e8eaf6; color: #1a237e; padding: 4px 10px; border-radius: 16px; font-size: 13px; font-family: monospace; }
  .pv-tag .remove { cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.6; }
  .pv-tag .remove:hover { opacity: 1; }
  .time-presets { display: flex; gap: 4px; }
  .custom-range { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .custom-range label { font-size: 13px; color: #666; }
  .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .auto-refresh select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  #chart-container { min-height: 400px; position: relative; }
  .chart-toolbar { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
  .chart-toolbar .spacer { flex: 1; }
  .chart-toolbar .hint { font-size: 11px; color: #999; }
  .msg { padding: 12px; border-radius: 4px; margin-top: 12px; font-size: 14px; }
  .msg-err { background: #ffebee; color: #c62828; }
  .msg-info { background: #e3f2fd; color: #1565c0; }
  .loading { color: #666; font-style: italic; }
  .status-bar { font-size: 12px; color: #999; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>EPICS Archiver - Data Viewer</h1>
  <a href="/mgmt/ui/">Management Console</a>
</div>

<div class="container">
  <!-- PV Input -->
  <div class="card">
    <h3>Process Variables</h3>
    <div class="form-row">
      <input type="text" id="pv-input" placeholder="PV name or mean_600(PV:NAME)" />
      <button class="btn-primary" onclick="addPV()">Add</button>
    </div>
    <div class="pv-tags" id="pv-tags"></div>
  </div>

  <!-- Time Range -->
  <div class="card">
    <h3>Time Range</h3>
    <div class="form-row">
      <div class="time-presets">
        <button class="btn-outline btn-sm" data-range="5m">5m</button>
        <button class="btn-outline btn-sm" data-range="1h">1h</button>
        <button class="btn-outline btn-sm" data-range="12h">12h</button>
        <button class="btn-outline btn-sm active" data-range="1d">1d</button>
        <button class="btn-outline btn-sm" data-range="1w">1w</button>
      </div>
      <button class="btn-primary" onclick="plotData()">Plot</button>
      <button class="btn-outline btn-sm" id="btn-autobin" onclick="toggleAutoBin()">Auto-bin</button>
      <div class="auto-refresh">
        <label><input type="checkbox" id="auto-refresh"> Auto-refresh</label>
        <select id="refresh-interval">
          <option value="10">10s</option>
          <option value="30" selected>30s</option>
          <option value="60">60s</option>
        </select>
      </div>
    </div>
    <div class="custom-range">
      <label>From:</label>
      <input type="datetime-local" id="time-from" step="1" />
      <label>To:</label>
      <input type="datetime-local" id="time-to" step="1" />
      <button class="btn-outline btn-sm" onclick="plotCustomRange()">Apply</button>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="chart-toolbar" id="chart-toolbar" style="display:none">
      <button class="btn-outline btn-sm" onclick="resetZoom()">Reset Zoom</button>
      <button class="btn-outline btn-sm" onclick="exportPNG()">PNG</button>
      <button class="btn-outline btn-sm" onclick="exportCSV()">CSV</button>
      <span style="margin-left:8px;font-size:12px;color:#666">Points:</span>
      <select id="point-style" class="btn-sm" style="border:1px solid #ccc;border-radius:4px;font-size:12px;padding:3px 6px" onchange="applyPointStyle()">
        <option value="none" selected>None</option>
        <option value="circle">Circle</option>
        <option value="square">Square</option>
        <option value="diamond">Diamond</option>
        <option value="triangle">Triangle</option>
        <option value="cross">Cross</option>
      </select>
      <span class="spacer"></span>
      <span class="hint">Drag: zoom | Shift+Drag: pan | Scroll: zoom | Double-click: reset</span>
    </div>
    <div id="chart-container"></div>
    <div class="status-bar" id="status-bar"></div>
  </div>
</div>

<script src="/mgmt/ui/vendor/uplot.min.js"></script>
<script>
'use strict';

const COLORS = ['#1a237e','#c62828','#2e7d32','#e65100','#6a1b9a','#00838f','#4e342e','#37474f'];
const RANGE_MS = { '5m': 5*60e3, '1h': 3600e3, '12h': 12*3600e3, '1d': 86400e3, '1w': 7*86400e3 };
let useAutoBin = false;
const AUTO_BIN_TARGET_POINTS = 2000;
const AUTO_BIN_CANDIDATES = [1, 5, 10, 30, 60, 120, 180, 300, 600, 900, 1800, 3600, 7200, 14400];

let pvList = [];
let activeRange = '1d';
let customFrom = null;
let customTo = null;
let uplot = null;
let resizeObserver = null;
let chartAbortController = null;
let refreshTimer = null;
let curXRange = null;       // current [min, max] in seconds — drives the x scale
let originalXRange = null;  // for reset zoom
let lastChartData = null;   // for export
let lastPlottable = null;   // for CSV export

// ── URL state ──

function readURL() {
  const params = new URLSearchParams(location.search);
  const pvs = params.getAll('pv');
  pvs.forEach(pv => { if (pv && !pvList.includes(pv)) pvList.push(pv); });
  if (params.get('range') && RANGE_MS[params.get('range')]) {
    activeRange = params.get('range');
  }
  if (params.get('from')) {
    customFrom = params.get('from');
    customTo = params.get('to') || null;
    activeRange = null;
  }
}

function syncURL() {
  const params = new URLSearchParams();
  pvList.forEach(pv => params.append('pv', pv));
  if (activeRange) {
    params.set('range', activeRange);
  } else {
    if (customFrom) params.set('from', customFrom);
    if (customTo) params.set('to', customTo);
  }
  const qs = params.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}

// ── PV management ──

function addPV(name) {
  const input = document.getElementById('pv-input');
  const pv = (name || input.value).trim();
  if (!pv || pvList.includes(pv)) return;
  pvList.push(pv);
  if (!name) input.value = '';
  renderTags();
  syncURL();
}

function removePV(pv) {
  pvList = pvList.filter(p => p !== pv);
  renderTags();
  syncURL();
  if (pvList.length === 0) clearChart();
}

function renderTags() {
  const el = document.getElementById('pv-tags');
  el.innerHTML = pvList.map((pv, i) =>
    `<span class="pv-tag" style="border-left: 3px solid ${COLORS[i % COLORS.length]}">` +
    `${esc(pv)} <span class="remove" onclick="removePV('${escAttr(pv)}')">&times;</span></span>`
  ).join('');
}

// ── Time range ──

document.querySelectorAll('[data-range]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeRange = btn.dataset.range;
    customFrom = null;
    customTo = null;
    document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    syncURL();
    syncDateInputs();
    plotData();
  });
});

function plotCustomRange() {
  const from = document.getElementById('time-from').value;
  const to = document.getElementById('time-to').value;
  if (!from) return;
  customFrom = new Date(from).toISOString();
  customTo = to ? new Date(to).toISOString() : new Date().toISOString();
  activeRange = null;
  document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('active'));
  syncURL();
  plotData();
}

function getTimeRange() {
  if (activeRange) {
    const to = new Date();
    const from = new Date(to.getTime() - RANGE_MS[activeRange]);
    return { from: from.toISOString(), to: to.toISOString() };
  }
  return { from: customFrom, to: customTo || new Date().toISOString() };
}

// Keep From/To inputs in sync with current range
function toLocalISO(d, withMs = false) {
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  // 19 = "YYYY-MM-DDTHH:MM:SS", 23 = "...SS.mmm". datetime-local inputs
  // (`step="1"`) want second precision; CSV wants milliseconds so
  // sub-second IOC samples don't collapse on the same row label.
  return local.toISOString().slice(0, withMs ? 23 : 19);
}

function syncDateInputs() {
  const { from, to } = getTimeRange();
  document.getElementById('time-from').value = toLocalISO(new Date(from));
  document.getElementById('time-to').value = toLocalISO(new Date(to));
}

// ── Auto-bin toggle ──

function toggleAutoBin() {
  useAutoBin = !useAutoBin;
  document.getElementById('btn-autobin').classList.toggle('active', useAutoBin);
  if (pvList.length) plotData();
}

// Pick the smallest server-side bin (in seconds) that yields ≤ AUTO_BIN_TARGET_POINTS
// for the requested range. Returns null when raw fits the target.
function computeAutoBin(durationSecs) {
  const ideal = durationSecs / AUTO_BIN_TARGET_POINTS;
  if (ideal < 1) return null;
  for (const c of AUTO_BIN_CANDIDATES) {
    if (c >= ideal) return c;
  }
  return AUTO_BIN_CANDIDATES[AUTO_BIN_CANDIDATES.length - 1];
}

// Detect operator-wrapped PV names like `mean_30(PV)` so we don't double-wrap user intent.
function isWrappedPV(pvName) {
  return /^[a-zA-Z][a-zA-Z]*_\d+\(.+\)$/.test(pvName.trim());
}

function effectivePV(pvName, autoBinSec) {
  if (autoBinSec == null || isWrappedPV(pvName)) return pvName;
  return `mean_${autoBinSec}(${pvName})`;
}

// Resolve the actual bin width (seconds) for `pvName` after wrapping.
// Used by the partial-last-bin filter so a user-specified bin (e.g.
// `mean_30(PV)`) isn't filtered with the autoBin width.
function effectiveBinSecs(pvName, autoBinSec) {
  if (isWrappedPV(pvName)) {
    const m = pvName.trim().match(/^[a-zA-Z]+_(\d+)\(/);
    return m ? parseInt(m[1], 10) : null;
  }
  return autoBinSec;
}

// Human-readable duration: 30→"30s", 300→"5m", 3600→"1h".
function formatBinDuration(secs) {
  if (secs >= 3600 && secs % 3600 === 0) return `${secs / 3600}h`;
  if (secs >= 60 && secs % 60 === 0) return `${secs / 60}m`;
  return `${secs}s`;
}

// ── Data fetch ──

async function fetchPV(pvName, from, to) {
  const url = `/retrieval/data/getData.json?pv=${encodeURIComponent(pvName)}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
  const data = await resp.json();
  if (!data.length || !data[0].data) return null;
  return data[0];
}

async function plotData() {
  if (!pvList.length) return;

  const container = document.getElementById('chart-container');
  const statusBar = document.getElementById('status-bar');
  container.innerHTML = '<p class="loading">Loading data...</p>';
  statusBar.textContent = '';

  const { from, to } = getTimeRange();
  const durationSecs = (new Date(to).getTime() - new Date(from).getTime()) / 1000;
  const autoBin = useAutoBin ? computeAutoBin(durationSecs) : null;

  try {
    const fetches = pvList.map(pv => {
      const fetchName = effectivePV(pv, autoBin);
      return fetchPV(fetchName, from, to).then(result => ({ pv, result })).catch(err => ({ pv, error: err }));
    });
    const results = await Promise.all(fetches);

    // Check for errors
    const errors = results.filter(r => r.error);
    let successes = results.filter(r => r.result);

    // Drop server-prepended continuity samples that fall before the requested
    // window, and (for binned requests) bins that overrun the right edge —
    // both render as boundary spikes when uPlot connects through them. The
    // per-PV bin width respects user-specified wrapping (e.g. `max_30(PV)`)
    // so we don't trim with the autoBin width when the actual bin is smaller.
    const fromEpoch = new Date(from).getTime() / 1000;
    const toEpoch = new Date(to).getTime() / 1000;
    successes.forEach(s => {
      const binSecs = effectiveBinSecs(s.pv, autoBin);
      s.result.data = s.result.data.filter(sample => {
        if (sample.secs < fromEpoch) return false;
        if (binSecs != null && sample.secs + binSecs > toEpoch) return false;
        return true;
      });
    });
    successes = successes.filter(s => s.result.data.length > 0);

    if (!successes.length) {
      container.innerHTML = errors.length
        ? `<div class="msg msg-err">Failed to fetch data: ${esc(errors[0].error.message)}</div>`
        : '<div class="msg msg-info">No data returned for the selected PVs and time range.</div>';
      return;
    }

    // Check plottability — only numeric scalars
    const plottable = [];
    for (const s of successes) {
      const sample = s.result.data[0];
      if (sample && (typeof sample.val === 'number' || typeof sample.val === 'string' && !isNaN(Number(sample.val)))) {
        plottable.push(s);
      } else if (sample && Array.isArray(sample.val)) {
        container.innerHTML = `<div class="msg msg-info">PV "${esc(s.pv)}" returns array data — not plottable as a simple chart.</div>`;
      } else if (sample && typeof sample.val === 'string') {
        container.innerHTML = `<div class="msg msg-info">PV "${esc(s.pv)}" returns string data — not plottable.</div>`;
      }
    }

    if (!plottable.length) {
      if (!container.querySelector('.msg')) {
        container.innerHTML = '<div class="msg msg-info">No plottable numeric data found.</div>';
      }
      return;
    }

    // Merge timestamps and build uPlot data
    const { timestamps, series } = mergeTimeSeries(plottable);

    // Pad boundaries so x-axis covers full requested range
    const xMin = new Date(from).getTime() / 1000;
    const xMax = new Date(to).getTime() / 1000;
    if (!timestamps.length || timestamps[0] > xMin) {
      timestamps.unshift(xMin);
      series.forEach(s => s.unshift(null));
    }
    if (timestamps[timestamps.length - 1] < xMax) {
      timestamps.push(xMax);
      series.forEach(s => s.push(null));
    }

    // Build uPlot options
    const pointsCfg = getPointsConfig();
    const seriesOpts = [{ label: 'Time' }];
    for (let i = 0; i < plottable.length; i++) {
      const pv = plottable[i].pv;
      const meta = plottable[i].result.meta || {};
      const egu = meta.EGU || '';
      const label = egu ? `${pv} (${egu})` : pv;
      seriesOpts.push({
        label,
        stroke: COLORS[pvList.indexOf(pv) % COLORS.length],
        width: 2,
        spanGaps: false,
        points: pointsCfg,
      });
    }

    const chartData = [timestamps, ...series];
    lastChartData = chartData;
    lastPlottable = plottable;

    // Tear down the previous chart instance before swapping in a new one.
    // Without this, auto-refresh accumulates uPlot objects and
    // ResizeObservers (each holding canvases / closure refs) — a few
    // dozen MB per hour of idle dashboard time.
    if (uplot) { uplot.destroy(); uplot = null; }
    if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
    container.innerHTML = '';
    const width = container.clientWidth;
    const height = Math.max(400, Math.min(600, window.innerHeight - 350));

    curXRange = [xMin, xMax];
    originalXRange = [xMin, xMax];

    const opts = {
      width,
      height,
      series: seriesOpts,
      axes: [
        { stroke: '#666', grid: { stroke: '#eee' } },
        { stroke: '#666', grid: { stroke: '#eee' }, size: 70 },
      ],
      cursor: {
        drag: { x: false, y: false },
      },
      scales: {
        x: {
          time: true,
          auto: false,
          range: () => curXRange,
        },
      },
    };

    uplot = new uPlot(opts, chartData, container);
    document.getElementById('chart-toolbar').style.display = 'flex';
    setupChartInteractions(height);

    // Resize handler. Tracked on a global so the next plotData() can
    // disconnect this observer instead of leaking it.
    resizeObserver = new ResizeObserver(() => {
      if (uplot) uplot.setSize({ width: container.clientWidth, height });
    });
    resizeObserver.observe(container);

    // Status
    let totalPoints = 0;
    plottable.forEach(s => { totalPoints += s.result.data.length; });
    statusBar.textContent = `${plottable.length} series, ${totalPoints.toLocaleString()} points total`;
    if (autoBin != null && pvList.some(p => !isWrappedPV(p))) {
      statusBar.textContent += ` | auto-bin: mean_${formatBinDuration(autoBin)}`;
    }
    if (errors.length) {
      statusBar.textContent += ` | ${errors.length} PV(s) failed`;
    }

  } catch (e) {
    container.innerHTML = `<div class="msg msg-err">${esc(e.message)}</div>`;
  }
}

function mergeTimeSeries(plottable) {
  // Single-PV fast path: skip Set/Map alignment entirely.
  if (plottable.length === 1) {
    const data = plottable[0].result.data;
    const n = data.length;
    const timestamps = new Array(n);
    const values = new Array(n);
    for (let i = 0; i < n; i++) {
      const sample = data[i];
      // Combine secs + nanos into a fractional Unix timestamp so samples
      // within the same second don't collapse to one x-coord (which would
      // make uPlot draw a vertical stack at each integer second).
      timestamps[i] = sample.secs + (sample.nanos || 0) / 1e9;
      const val = typeof sample.val === 'number' ? sample.val : Number(sample.val);
      values[i] = isNaN(val) ? null : val;
    }
    return { timestamps, series: [values] };
  }

  // Multi-PV: align on union of timestamps so uPlot can share one x-axis.
  const tsSet = new Set();
  const pvData = plottable.map(s => {
    const map = new Map();
    for (const sample of s.result.data) {
      const t = sample.secs + (sample.nanos || 0) / 1e9;
      tsSet.add(t);
      const val = typeof sample.val === 'number' ? sample.val : Number(sample.val);
      map.set(t, isNaN(val) ? null : val);
    }
    return map;
  });

  const timestamps = Float64Array.from(tsSet).sort();
  const series = pvData.map(map => {
    const arr = new Array(timestamps.length);
    for (let i = 0; i < timestamps.length; i++) {
      const v = map.get(timestamps[i]);
      arr[i] = v !== undefined ? v : null;
    }
    return arr;
  });

  return { timestamps: Array.from(timestamps), series };
}

function clearChart() {
  const container = document.getElementById('chart-container');
  container.innerHTML = '';
  document.getElementById('status-bar').textContent = '';
  document.getElementById('chart-toolbar').style.display = 'none';
  if (uplot) { uplot.destroy(); uplot = null; }
  if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
  if (chartAbortController) { chartAbortController.abort(); chartAbortController = null; }
  lastChartData = null;
  lastPlottable = null;
  originalXRange = null;
}

// ── Point shapes ──

function drawShape(ctx, cx, cy, r, shape) {
  switch (shape) {
    case 'square':
      ctx.rect(cx - r, cy - r, r * 2, r * 2);
      break;
    case 'diamond':
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      break;
    case 'triangle':
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy + r * 0.8);
      ctx.lineTo(cx - r, cy + r * 0.8);
      ctx.closePath();
      break;
    case 'cross': {
      const t = r * 0.35;
      ctx.moveTo(cx - t, cy - r);
      ctx.lineTo(cx + t, cy - r);
      ctx.lineTo(cx + t, cy - t);
      ctx.lineTo(cx + r, cy - t);
      ctx.lineTo(cx + r, cy + t);
      ctx.lineTo(cx + t, cy + t);
      ctx.lineTo(cx + t, cy + r);
      ctx.lineTo(cx - t, cy + r);
      ctx.lineTo(cx - t, cy + t);
      ctx.lineTo(cx - r, cy + t);
      ctx.lineTo(cx - r, cy - t);
      ctx.lineTo(cx - t, cy - t);
      ctx.closePath();
      break;
    }
    default: // circle
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      break;
  }
}

function makePointsPaths(shape) {
  return (u, sidx, i0, i1) => {
    const s = u.series[sidx];
    const xdata = u.data[0];
    const ydata = u.data[sidx];
    const r = (s.points.size || 6) / 2 * devicePixelRatio;
    const p = new Path2D();
    for (let i = i0; i <= i1; i++) {
      const v = ydata[i];
      if (v == null) continue;
      const cx = Math.round(u.valToPos(xdata[i], 'x', true));
      const cy = Math.round(u.valToPos(v, u.series[sidx].scale || 'y', true));
      p.moveTo(cx + r, cy);
      drawShape(p, cx, cy, r, shape);
    }
    return { stroke: p, fill: p };
  };
}

function getPointsConfig() {
  const shape = document.getElementById('point-style').value;
  if (shape === 'none') return { show: false };
  const cfg = { show: true, size: 5, fill: 'white', width: 2 };
  if (shape !== 'circle') cfg.paths = makePointsPaths(shape);
  return cfg;
}

function applyPointStyle() {
  if (!uplot) return;
  const cfg = getPointsConfig();
  for (let i = 1; i < uplot.series.length; i++) {
    uplot.series[i].points = cfg;
  }
  uplot.redraw();
}

// ── Chart interactions: zoom, pan, reset ──

function setXRange(min, max) {
  curXRange = [min, max];
  uplot.redraw();
}

function setupChartInteractions(chartHeight) {
  // Bind every listener (incl. document-level mousemove/mouseup) to a
  // fresh AbortController so the next plotData() can yank them all at
  // once — without this each refresh leaks 4 document listeners that
  // accumulate forever and add latency to every mouse move.
  if (chartAbortController) chartAbortController.abort();
  chartAbortController = new AbortController();
  const signal = chartAbortController.signal;

  const over = uplot.over;

  // ── Drag-to-zoom (box select) ──
  let dragStart = null;
  const selectBox = document.createElement('div');
  selectBox.style.cssText = 'position:absolute;top:0;height:100%;background:rgba(26,35,126,0.1);border:1px solid rgba(26,35,126,0.3);pointer-events:none;display:none;z-index:10;';
  over.appendChild(selectBox);

  over.addEventListener('mousedown', e => {
    if (e.shiftKey || e.button !== 0) return;
    dragStart = { x: e.clientX, left: e.offsetX };
  }, { signal });

  document.addEventListener('mousemove', e => {
    if (!dragStart) return;
    const dx = e.clientX - dragStart.x;
    if (Math.abs(dx) < 3) { selectBox.style.display = 'none'; return; }
    selectBox.style.display = 'block';
    const left = dx > 0 ? dragStart.left : dragStart.left + dx;
    selectBox.style.left = Math.max(0, left) + 'px';
    selectBox.style.width = Math.min(Math.abs(dx), over.clientWidth - Math.max(0, left)) + 'px';
  }, { signal });

  document.addEventListener('mouseup', e => {
    if (!dragStart) return;
    const dx = e.clientX - dragStart.x;
    selectBox.style.display = 'none';
    if (Math.abs(dx) > 5) {
      const rect = over.getBoundingClientRect();
      const x1 = Math.max(0, Math.min(dragStart.x, e.clientX) - rect.left);
      const x2 = Math.min(rect.width, Math.max(dragStart.x, e.clientX) - rect.left);
      const newMin = uplot.posToVal(x1, 'x');
      const newMax = uplot.posToVal(x2, 'x');
      setXRange(newMin, newMax);
    }
    dragStart = null;
  }, { signal });

  // ── Wheel zoom ──
  over.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = over.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const xVal = uplot.posToVal(cx, 'x');
    const [min, max] = curXRange;
    const range = max - min;
    const factor = e.deltaY > 0 ? 1.25 : 0.8;
    const newRange = range * factor;
    const ratio = (xVal - min) / range;
    setXRange(xVal - newRange * ratio, xVal + newRange * (1 - ratio));
  }, { passive: false, signal });

  // ── Shift+Drag pan ──
  let panStart = null;
  over.addEventListener('mousedown', e => {
    if (!e.shiftKey || e.button !== 0) return;
    e.preventDefault();
    over.style.cursor = 'grabbing';
    panStart = { x: e.clientX, range: [...curXRange] };
  }, { signal });

  document.addEventListener('mousemove', e => {
    if (!panStart) return;
    const dx = e.clientX - panStart.x;
    const pxWidth = uplot.over.clientWidth;
    const valRange = panStart.range[1] - panStart.range[0];
    const shift = -(dx / pxWidth) * valRange;
    setXRange(panStart.range[0] + shift, panStart.range[1] + shift);
  }, { signal });

  document.addEventListener('mouseup', () => {
    if (panStart) { over.style.cursor = ''; panStart = null; }
  }, { signal });

  // ── Double-click reset ──
  over.addEventListener('dblclick', () => resetZoom(), { signal });
}

function resetZoom() {
  if (uplot && originalXRange) {
    setXRange(originalXRange[0], originalXRange[1]);
  }
}

// ── Export PNG ──

function exportPNG() {
  if (!uplot) return;
  const src = uplot.ctx.canvas;
  const tmp = document.createElement('canvas');
  tmp.width = src.width;
  tmp.height = src.height;
  const ctx = tmp.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, tmp.width, tmp.height);
  ctx.drawImage(src, 0, 0);
  const a = document.createElement('a');
  a.download = (pvList[0] || 'chart') + '.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
}

// ── Export CSV ──

function exportCSV() {
  if (!lastChartData || !lastPlottable) return;
  const ts = lastChartData[0];
  const headers = ['timestamp', ...lastPlottable.map(p => p.pv)];
  const lines = [headers.join(',')];
  for (let i = 0; i < ts.length; i++) {
    const row = [toLocalISO(new Date(ts[i] * 1000), true)];
    for (let s = 1; s < lastChartData.length; s++) {
      const v = lastChartData[s][i];
      row.push(v != null ? v : '');
    }
    lines.push(row.join(','));
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.download = (pvList[0] || 'data') + '.csv';
  a.href = URL.createObjectURL(blob);
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Auto-refresh ──

document.getElementById('auto-refresh').addEventListener('change', function() {
  if (this.checked) {
    startAutoRefresh();
  } else {
    stopAutoRefresh();
  }
});

document.getElementById('refresh-interval').addEventListener('change', function() {
  if (document.getElementById('auto-refresh').checked) {
    stopAutoRefresh();
    startAutoRefresh();
  }
});

function startAutoRefresh() {
  stopAutoRefresh();
  const seconds = parseInt(document.getElementById('refresh-interval').value) || 30;
  refreshTimer = setInterval(() => {
    if (!document.hidden && pvList.length > 0) {
      plotData();
    }
  }, seconds * 1000);
}

function stopAutoRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

// ── Input handlers ──

document.getElementById('pv-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPV();
});


// ── Utility ──

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/\\/g, '\\\\');
}

// ── Init ──

readURL();
renderTags();

// Highlight active range button
document.querySelectorAll('[data-range]').forEach(b => {
  b.classList.toggle('active', b.dataset.range === activeRange);
});

// Always populate From/To inputs with current range
syncDateInputs();

// Auto-plot if PVs in URL
if (pvList.length) plotData();
</script>
