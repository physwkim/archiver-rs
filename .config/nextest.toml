# cargo-nextest configuration for the archiver-rs workspace.
#
# nextest runs each test in its own process, several in parallel — far
# more concurrency than `cargo test` (which multiplexes tests as threads
# inside one binary). The API integration suites (tests/api_*.rs) bind
# ephemeral loopback ports (`127.0.0.1:0`), so the OS hands each process
# a distinct free port and parallel binding is race-free; no per-group
# thread cap is needed here.
#
# Two profiles:
#   * default — local dev loop (`cargo nextest run --workspace`).
#   * ci      — the cross-platform matrix (`--profile ci`): retries the
#               genuinely flaky network/timing suites so a transient
#               port/scheduling hiccup on a slow hosted runner doesn't
#               red the build, while a real bug still fails all attempts.

[profile.default]
# Per-test soft timeout, then a hard kill after 4 periods (4 min). A
# real bug surfaces in seconds; a multi-minute test is a hang worth
# flagging. Generous enough to absorb slow Windows/arm64 CI runners.
slow-timeout = { period = "60s", terminate-after = 4 }

[profile.ci]
# Don't stop the whole run on the first failure — every matrix cell
# should report all its failures, not just the first.
fail-fast = false
# Absorb transient network/timing flakes on hosted runners. A genuine
# regression fails all three attempts; a flake usually passes the retry.
retries = 2
slow-timeout = { period = "60s", terminate-after = 4 }
status-level = "retry"
final-status-level = "flaky"
