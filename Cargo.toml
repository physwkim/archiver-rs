[workspace]
members = [
    "crates/archiver-proto",
    "crates/archiver-core",
    "crates/archiver-engine",
    "crates/archiver-bluesky",
    "crates/archiver-api",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
# Protobuf
prost = "0.13"
prost-build = "0.13"

# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP
axum = "0.8"
tower-http = { version = "0.6", features = ["cors", "trace"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }

# Kafka
rdkafka = { version = "0.37", features = ["cmake-build"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Config
toml = "0.8"

# Concurrent data structures
dashmap = "6"

# Async trait
async-trait = "0.1"

# Stream utilities
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["rt"] }

# SQLite
rusqlite = { version = "0.34", features = ["bundled"] }

# EPICS Channel Access
epics-base-rs = "0.4"

# URL encoding
urlencoding = "2"

# Futures combinators
futures = "0.3"

# Testing
tempfile = "3"

# Internal crates
archiver-proto = { path = "crates/archiver-proto" }
archiver-core = { path = "crates/archiver-core" }
archiver-engine = { path = "crates/archiver-engine" }
archiver-bluesky = { path = "crates/archiver-bluesky" }
archiver-api = { path = "crates/archiver-api" }

[package]
name = "archiver"
version.workspace = true
edition.workspace = true

[dependencies]
archiver-core = { workspace = true }
archiver-engine = { workspace = true }
archiver-bluesky = { workspace = true }
archiver-api = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
toml = { workspace = true }
serde = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
